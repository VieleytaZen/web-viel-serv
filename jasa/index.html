<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup & Lifestyle</title>
    <link rel="icon" type="image/png" href="/assets/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .product-card { background: #ffffff; border: 1px solid rgba(0,0,0,0.03); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.2); }
        #share-toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 0.75rem; font-weight: bold; z-index: 1000; display: none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="share-toast" class="animate__animated">Link Tersalin ke Clipboard! 📋</div>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] max-w-3xl w-full max-h-[90vh] overflow-y-auto custom-scroll p-8 md:p-12 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-indigo-600 text-3xl transition">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <nav class="py-6 px-10 flex justify-between items-center bg-white/70 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-50">
        <a href="../../index.html" class="group flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-indigo-600 transition">
            <span class="transform group-hover:-translate-x-1 transition-transform">←</span> Home
        </a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600 uppercase">Viel Picks.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center animate__animated animate__fadeIn">
        <span class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block tracking-[0.2em]">Curated Collection</span>
        <h1 class="text-5xl md:text-7xl font-extrabold text-slate-900 mb-6 tracking-tighter">Essential <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">Gears.</span></h1>
        <p class="text-slate-500 text-sm md:text-base max-w-xl mx-auto leading-relaxed">Upgrade produktivitas dan gaya hidupmu dengan produk pilihan terbaik.</p>
    </header>

    <div class="max-w-2xl mx-auto mb-16 px-6 animate__animated animate__fadeInUp">
        <div class="relative group mb-8">
            <input type="text" id="product-search" onkeyup="searchProducts()" 
                   placeholder="Cari gadget, merk, atau outfit..." 
                   class="w-full bg-white border border-slate-200 rounded-3xl py-5 px-10 pr-24 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all duration-300 shadow-sm">
            
            <div class="absolute right-6 top-3.5 flex items-center gap-2">
                <button onclick="startVoiceSearch()" id="mic-btn" class="p-2 text-slate-300 hover:text-indigo-600 transition-colors" title="Cari dengan suara">
                    <svg xmlns="http://www.w3.org/2000/svg" id="mic-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
                <div class="text-slate-300 group-focus-within:text-indigo-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
        </div>
        <div id="brand-tags" class="flex flex-wrap justify-center gap-2"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center py-24 opacity-20">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            </div>
        </div>
    </main>

    <script>
        let allProducts = []; 
        let currentBrandFilter = "";

        async function fetchAffiliate() {
            const username = "VieleytaZen";
            const repo = "web-viel-serv";
            const folderPath = "jasa/affiliate/items";

            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}?ref=main&cb=${Date.now()}`);
                const files = await res.json();
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                const promises = jsonFiles.map(f => fetch(f.download_url).then(r => r.json()));
                allProducts = await Promise.all(promises);

                // Cek URL Query (?q=...)
                const urlParams = new URLSearchParams(window.location.search);
                const query = urlParams.get('q');
                if (query) {
                    document.getElementById('product-search').value = query;
                }

                searchProducts();
            } catch (e) {
                document.getElementById('affiliate-grid').innerHTML = "<p class='col-span-full text-center'>Gagal memuat data.</p>";
            }
        }

        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser tidak mendukung suara.");
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            const micIcon = document.getElementById('mic-icon');
            
            micIcon.classList.add('text-red-500', 'animate-pulse');
            recognition.start();

            recognition.onresult = (event) => {
                document.getElementById('product-search').value = event.results[0][0].transcript;
                searchProducts();
            };
            recognition.onend = () => micIcon.classList.remove('text-red-500', 'animate-pulse');
        }

        function searchProducts() {
            const query = document.getElementById('product-search').value.toLowerCase().trim();
            const filtered = allProducts.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(query) || (p.brand && p.brand.toLowerCase().includes(query)) || (p.category && p.category.toLowerCase().includes(query));
                const matchesBrand = !currentBrandFilter || p.brand === currentBrandFilter;
                return matchesSearch && matchesBrand;
            });
            renderProducts(filtered, !currentBrandFilter && !query);
        }

        function filterByBrand(brand) {
            currentBrandFilter = brand;
            searchProducts();
        }

        function renderProducts(products, refreshTags = true) {
            const container = document.getElementById('affiliate-grid');
            if (refreshTags) {
                const brands = [...new Set(allProducts.map(p => p.brand).filter(b => b))];
                let tagHtml = `<button onclick="filterByBrand('')" class="px-5 py-2 rounded-full text-[10px] font-bold border ${!currentBrandFilter ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400'} transition">ALL</button>`;
                brands.forEach(b => tagHtml += `<button onclick="filterByBrand('${b}')" class="px-5 py-2 rounded-full text-[10px] font-bold border ${currentBrandFilter === b ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400'} transition uppercase tracking-widest">${b}</button>`);
                document.getElementById('brand-tags').innerHTML = tagHtml;
            }

            let html = '';
            products.forEach((item, index) => {
                html += `
                    <div onclick="openModal('${item.title.replace(/'/g, "\\'")}')" class="product-card group cursor-pointer rounded-[2.5rem] overflow-hidden animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="aspect-[4/5] bg-slate-100 relative overflow-hidden">
                            <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        </div>
                        <div class="p-8">
                            <p class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">${item.brand || 'Viel Picks'}</p>
                            <h3 class="font-bold text-slate-800 text-sm leading-snug line-clamp-2 mb-4">${item.title}</h3>
                            <div class="flex justify-between items-center pt-5 border-t border-slate-50">
                                <span class="font-black text-slate-900 text-base">${item.price}</span>
                                <span class="text-indigo-600 text-[10px] font-black uppercase">Detail →</span>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || "<p class='col-span-full text-center py-20 opacity-30 uppercase text-xs font-bold tracking-widest'>Produk tidak ditemukan.</p>";
        }

        function openModal(title) {
            const item = allProducts.find(p => p.title === title);
            if(!item) return;
            document.getElementById('modal-body').innerHTML = `
                <div class="grid md:grid-cols-2 gap-12 items-start">
                    <div class="aspect-[4/5] rounded-[2.5rem] overflow-hidden shadow-2xl"><img src="${item.image}" class="w-full h-full object-cover"></div>
                    <div>
                        <span class="px-4 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest">${item.category || 'GEAR'}</span>
                        <h2 class="text-4xl font-extrabold text-slate-900 mt-4 mb-2 leading-tight">${item.title}</h2>
                        <p class="text-3xl font-black text-indigo-600 mb-8">${item.price}</p>
                        <p class="text-slate-500 mb-10 leading-relaxed border-t border-slate-100 pt-8">${item.desc || 'Produk pilihan terbaik yang dikurasi langsung oleh Viel.'}</p>
                        <a href="${item.link}" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-6 rounded-3xl font-bold shadow-xl hover:bg-indigo-700 transition uppercase tracking-widest text-xs">Beli Sekarang</a>
                    </div>
                </div>`;
            document.getElementById('product-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }

        window.onload = fetchAffiliate;
    </script>
</body>
</html>

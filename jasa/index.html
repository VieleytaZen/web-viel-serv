<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Digital | Professional Web & Bot Developer</title>
    
    <meta name="description" content="Jasa pembuatan website modern dan bot automasi profesional oleh Viel Digital.">
    <meta name="keywords" content="jasa pembuatan web, jasa bot telegram, jasa bot whatsapp, web developer indonesia">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        .glass-nav { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .card-modern {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-modern:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900">

    <nav class="glass-nav sticky top-0 z-50 py-4">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="text-slate-400 hover:text-indigo-600 transition text-sm font-bold">← Home</a>
                <div class="h-5 w-[1px] bg-gray-200"></div>
                <span class="text-lg font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Viel Digital</span>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="affiliate/index.html" class="text-indigo-600 font-bold text-[10px] md:text-sm uppercase tracking-tighter">Affiliate ✨</a>
                <a href="https://wa.me/6282133692292" target="_blank" class="bg-indigo-600 text-white px-3 py-1.5 md:px-6 md:py-2.5 rounded-full text-[10px] md:text-sm font-bold shadow-lg">Konsultasi</a>
            </div>
        </div>
    </nav>

    <header class="py-24 bg-white border-b border-slate-50 relative overflow-hidden text-center">
        <div class="max-w-4xl mx-auto px-6 relative z-10 animate__animated animate__fadeIn">
            <span class="inline-block px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Software Development</span>
            <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">
                Ubah Ide Menjadi<br><span class="text-indigo-600 italic">Produk Digital.</span>
            </h1>
            <p class="text-lg text-slate-500 max-w-2xl mx-auto leading-relaxed">
                Menyediakan jasa pembuatan website modern dan automasi bot dengan performa tinggi.
            </p>
        </div>
    </header>

    <section id="jasa" class="max-w-6xl mx-auto py-24 px-6">
        <div class="flex items-center gap-6 mb-16">
            <h2 class="text-3xl font-extrabold tracking-tight">Layanan Coding</h2>
            <div class="h-[2px] flex-1 bg-slate-100"></div>
        </div>
        <div id="jasa-grid" class="grid md:grid-cols-2 gap-10">
            </div>
    </section>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="animate__animated animate__zoomIn bg-white rounded-[3rem] max-w-lg w-full p-12 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-3xl transition">&times;</button>
            
            <div id="modal-content"></div>
            
            <div class="mt-10 text-center">
                <a id="modal-cta" href="#" target="_blank" class="block w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Diskusikan Project</a>
            </div>
        </div>
    </div>

    <footer class="bg-white py-16 text-center border-t border-slate-100">
        <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">&copy; 2026 Crafted by Viel Digital</p>
    </footer>

    <script>
        // Fungsi utama untuk mengambil data dari JSON
        async function renderJasa() {
            const container = document.getElementById('jasa-grid');
            try {
                // Fetch data.json dengan anti-cache agar data admin langsung muncul
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                
                // Simpan ke variable global agar fungsi modal bisa akses
                window.currentData = data.digital;

                let html = '';
                data.digital.forEach((item, index) => {
                    const icon = item.id === 'web-dev' ? 
                        '<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>' : 
                        '<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';

                    html += `
                        <div class="card-modern bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                            <div class="flex justify-between items-start mb-8">
                                <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                                    ${icon}
                                </div>
                                <span class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1 rounded-full">${item.price}</span>
                            </div>
                            <h3 class="text-2xl font-black mb-4">${item.title}</h3>
                            <p class="text-slate-500 mb-8 leading-relaxed">${item.desc}</p>
                            <button onclick="openModalJSON('${item.id}')" class="text-indigo-600 font-black flex items-center gap-2 group tracking-widest text-xs">
                                CEK DETAIL <span class="group-hover:translate-x-2 transition-transform">→</span>
                            </button>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (error) {
                console.error("Gagal memuat data jasa:", error);
                container.innerHTML = "<p class='text-center text-slate-400'>Gagal memuat layanan. Pastikan data.json sudah ada.</p>";
            }
        }

        // Fungsi Buka Modal
        function openModalJSON(id) {
            const item = window.currentData.find(d => d.id === id);
            if(item) {
                document.getElementById('modal-content').innerHTML = `
                    <h2 class="text-3xl font-black text-slate-900 mb-6">${item.title}</h2>
                    <div class="text-left bg-slate-50 p-8 rounded-[2rem] text-slate-600 leading-relaxed">
                        ${item.detail}
                    </div>
                `;
                document.getElementById('modal-cta').href = item.waLink;
                document.getElementById('modal-container').classList.remove('hidden');
            }
        }

        // Fungsi Tutup Modal (Tombol X)
        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        // Tutup modal jika klik di luar area modal
        window.onclick = function(event) {
            const modal = document.getElementById('modal-container');
            if (event.target == modal) {
                closeModal();
            }
        }

        document.addEventListener('DOMContentLoaded', renderJasa);
    </script>
</body>
</html>

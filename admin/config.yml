backend:
  name: github
  repo: VieleytaZen/web-viel-serv
  branch: main

local_backend: true

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "affiliate"
    label: "🛒 Produk Affiliate"
    folder: "jasa/affiliate/items"
    extension: "json"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Nama Produk", name: "title", widget: "string"}
      - {label: "Harga", name: "price", widget: "string"}
      
      # Kategori & Sub-Kategori dibuat 'string' agar bebas ketik (Contoh: Celana)
      - {label: "Kategori Utama", name: "category", widget: "string", hint: "Contoh: Digital, Pakaian, Aksesoris", required: false}
      - {label: "Sub-Kategori", name: "sub", widget: "string", hint: "Contoh: Celana, Software, Mouse", required: false}
      
      # Tambahan Rate Produk
      - {label: "Rate Produk (1-5)", name: "rate", widget: "number", value_type: "float", min: 1, max: 5, step: 0.1, required: false}
      
      # Deskripsi Produk Kompleks
      - {label: "Deskripsi Produk", name: "desc", widget: "markdown", required: false}
      
      - {label: "Link Shopee/Affiliate", name: "link", widget: "string"}
      - {label: "Foto Produk", name: "image", widget: "image"}

  - name: "jasa_coding"
    label: "💻 Jasa Coding"
    files:
      - label: "Data Jasa Coding"
        name: "jasa_coding"
        file: "jasa/data.json"
        fields:
          - name: "digital"
            label: "List Jasa"
            widget: "list"
            fields:
              - {label: "ID (Penting: web-dev/bot-dev)", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Desc Singkat", name: "desc", widget: "string"}
              - {label: "Detail (HTML)", name: "detail", widget: "text"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Link WA", name: "waLink", widget: "string"}

  - name: "jasa_cleaning"
    label: "🧹 Jasa Cleaning"
    files:
      - label: "Data Cleaning"
        name: "jasa_cleaning"
        file: "cleaning/data.json"
        fields:
          - name: "cleaning"
            label: "List Cleaning"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Desc Singkat", name: "desc", widget: "string"}
              - {label: "Detail", name: "detail", widget: "text"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Link WA", name: "waLink", widget: "string"}
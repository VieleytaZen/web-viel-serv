<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Closer - Viel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0b5394; border-left: 5px solid #0b5394; padding-left: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #0b5394; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 11px; color: white; font-weight: bold; }
        .st-menunggu { background: #999; }
        .st-tertarik { background: #a4c2f4; color: #1155cc !important; }
        .st-ditolak { background: #cc0000; }
        .st-sudahbayar { background: #3c78d8; }
        .st-taketrial { background: #783f04; }
        .table-container { overflow-x: auto; margin-top: 35px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Tim Scout & Closer</h2>
    <form id="marketingForm">
        <div class="form-grid">
            <input type="text" id="namaCloser" placeholder="Nama CLOSER" required>
            <input type="text" id="namaGrup" placeholder="Nama Grup / User" required>
            <input type="text" id="linkWa" placeholder="Link / No. WA" required>
            <input type="number" id="jumlahMember" placeholder="Jumlah Member" required>
        </div>
        <textarea id="catatan" rows="3" placeholder="Catatan..." style="margin-top:15px"></textarea>
        <button type="submit" id="submitBtn">SIMPAN DATA KE SHEET</button>
    </form>

    <div class="table-container">
        <table id="statusTable">
            <thead>
                <tr>
                    <th>TANGGAL</th>
                    <th>CLOSER</th>
                    <th>GRUP/USER</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="text-align:center">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx8GXUQ2MMw3GyZJpYIf7CP82-BIQ0e3BL0XjuZrtJalSRAbCgzO7oLIn4al_BaNiYwtw/exec';

    // FUNGSI KIRIM DATA
    document.getElementById('marketingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Sedang Mengirim...';
        btn.disabled = true;

        const payload = {
            namaCloser: document.getElementById('namaCloser').value,
            namaGrup: document.getElementById('namaGrup').value,
            linkWa: document.getElementById('linkWa').value,
            jumlahMember: document.getElementById('jumlahMember').value,
            catatan: document.getElementById('catatan').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            alert('Sukses Terkirim!');
            document.getElementById('marketingForm').reset();
            btn.innerText = 'SIMPAN DATA KE SHEET';
            btn.disabled = false;
            fetchData();
        });
    });

    // FUNGSI AMBIL DATA
    function fetchData() {
        fetch(WEB_APP_URL, { redirect: 'follow' })
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Belum ada data.</td></tr>';
                return;
            }
            data.forEach(row => {
                let statusText = row[5] || 'Menunggu';
                let stClass = 'st-menunggu';
                const s = statusText.toLowerCase();
                if(s.includes('tolak')) stClass = 'st-ditolak';
                else if(s.includes('tarik')) stClass = 'st-tertarik';
                else if(s.includes('bayar')) stClass = 'st-sudahbayar';
                else if(s.includes('trial')) stClass = 'st-taketrial';

                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td>
                    <td><b>${row[1]}</b></td>
                    <td>${row[2]}</td>
                    <td><span class="status ${stClass}">${statusText}</span></td>
                </tr>`;
            });
        }).catch(err => {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:red">Gagal memuat. Periksa koneksi.</td></tr>';
        });
    }

    // Panggil fungsi saat halaman pertama kali dibuka
    fetchData(); 
</script>

</body>
</html>

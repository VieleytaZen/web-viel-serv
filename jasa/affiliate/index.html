<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; }
    </style>
</head>
<body>
    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600">VIEL PICKS.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center animate__animated animate__fadeIn">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">Rekomendasi Setup</h1>
        <p class="text-slate-400 text-sm">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <p class="col-span-full text-center text-slate-300 text-xs animate-pulse uppercase tracking-widest">Menghubungkan ke database...</p>
        </div>
    </main>

    <script>
        let allProducts = [];

        async function fetchAffiliate() {
    const container = document.getElementById('affiliate-grid');
    const username = "VieleytaZen";
    const repo = "web-viel-serv";
    const folderPath = "jasa/affiliate/items"; 

    try {
        // Tambahkan cache buster agar data selalu fresh
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}?ref=main&cb=${Date.now()}`);
        
        if (!response.ok) {
            throw new Error("Folder 'items' belum terdaftar di GitHub. Silakan Push folder tersebut.");
        }
        
        const files = await response.json();
        // Hanya ambil file .json dan pastikan bukan folder
        const jsonFiles = files.filter(file => file.name.endsWith('.json') && file.type === 'file');

        if (jsonFiles.length === 0) {
            container.innerHTML = "<p class='col-span-full text-center text-slate-400 py-20 text-xs uppercase tracking-widest'>Folder 'items' ditemukan, tapi belum ada file produk di dalamnya.</p>";
            return;
        }

        const promises = jsonFiles.map(file => fetch(file.download_url).then(res => res.json()));
        const allProducts = await Promise.all(promises);

        renderProducts(allProducts);
    } catch (e) {
        console.error("Error Detail:", e);
        container.innerHTML = `<div class='col-span-full text-center py-20 opacity-50'>
            <p class='text-[10px] font-black uppercase tracking-tighter text-slate-400'>Database Offline</p>
            <p class='text-[8px] text-slate-300 mt-2'>${e.message.toUpperCase()}</p>
        </div>`;
    }
}

        function renderProducts(products) {
            const container = document.getElementById('affiliate-grid');
            let html = '';
            
            if (!products || products.length === 0) {
                container.innerHTML = "<p class='col-span-full text-center text-slate-400 py-20'>Folder produk masih kosong.</p>";
                return;
            }

            products.forEach((item, index) => {
                html += `
                    <div class="group bg-white border border-slate-100 rounded-[2.5rem] overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="aspect-square overflow-hidden bg-slate-50">
                            <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="${item.title}">
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-3">
                                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[8px] font-black uppercase tracking-widest">${item.category || 'GEAR'}</span>
                                <span class="text-[9px] font-bold text-slate-300 italic">${item.sub || ''}</span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-base mb-4 leading-tight">${item.title}</h3>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                                <span class="font-black text-slate-900 text-sm">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl text-[10px] font-bold transition-all shadow-lg shadow-indigo-100">BELI</a>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.onload = fetchAffiliate;
    </script>
</body>
</html>

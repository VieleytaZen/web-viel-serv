<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600">VIEL PICKS.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3">Rekomendasi Setup</h1>
        <p class="text-slate-400">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        async function renderJasa() {
    const container = document.getElementById('jasa-grid');
    try {
        const response = await fetch('data.json?v=' + Date.now());
        const data = await response.json();
        window.currentData = data.digital; 

        let html = '';
        data.digital.forEach((item) => {
            // Gunakan ID sebagai referensi modal
            html += `
                <div class="card-modern bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm animate__animated animate__fadeInUp">
                    <div class="flex justify-between items-start mb-8 text-3xl">
                        ✨ <span class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1 rounded-full">${item.price}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-4">${item.title}</h3>
                    <p class="text-slate-500 mb-8 leading-relaxed">${item.desc || 'No description'}</p>
                    <button onclick="openModalJSON('${item.id}')" class="text-indigo-600 font-black tracking-widest text-xs uppercase">CEK DETAIL →</button>
                </div>`;
        });
        container.innerHTML = html;
    } catch (e) { console.error("Error:", e); }
}
        window.onload = renderAffiliate;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Closer - Viel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0b5394; font-size: 1.5rem; margin-bottom: 20px; border-left: 5px solid #0b5394; padding-left: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { background: #0b5394; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        button:disabled { background: #ccc; }
        .status { padding: 4px 10px; border-radius: 20px; font-size: 10px; color: white; font-weight: bold; text-transform: uppercase; }
        .st-menunggu { background: #999; }
        .st-tertarik { background: #a4c2f4; color: #1155cc !important; }
        .st-ditolak { background: #cc0000; }
        .st-sudahbayar { background: #3c78d8; }
        .st-taketrial { background: #783f04; }
        .table-container { overflow-x: auto; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 12px; border-bottom: 2px solid #dee2e6; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Tim Scout & Closer</h2>
    <form id="marketingForm">
        <div class="form-grid">
            <div><label>Nama CLOSER</label><input type="text" id="namaCloser" placeholder="Misal: JEN" required></div>
            <div><label>Nama Grup / User</label><input type="text" id="namaGrup" placeholder="Grup WA/Tele" required></div>
            <div><label>Link / No. WA</label><input type="text" id="linkWa" placeholder="https://chat.whatsapp..." required></div>
            <div><label>Jumlah Member</label><input type="number" id="jumlahMember" placeholder="Angka saja" required></div>
        </div>
        <div style="margin-top:15px">
            <label>Catatan</label>
            <textarea id="catatan" rows="2" placeholder="Tambahkan keterangan..."></textarea>
        </div>
        <button type="submit" id="submitBtn">SIMPAN DATA KE SHEET</button>
    </form>

    <div class="table-container">
        <table id="statusTable">
            <thead>
                <tr>
                    <th>TANGGAL</th>
                    <th>CLOSER</th>
                    <th>GRUP/USER</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="text-align:center">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyisI1WWaDx0PFq-PGoKsgzlU6_J2gz0WwzW4qrekgxyu8GCL9zueCh5dvXBrPJ0WT3SA/exec';

    // FUNGSI SIMPAN DATA
    document.getElementById('marketingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Sedang Mengirim...';
        btn.disabled = true;

        const payload = {
            namaCloser: document.getElementById('namaCloser').value,
            namaGrup: document.getElementById('namaGrup').value,
            linkWa: document.getElementById('linkWa').value,
            jumlahMember: document.getElementById('jumlahMember').value,
            catatan: document.getElementById('catatan').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        }).then(() => {
            alert('Sukses Terkirim!');
            document.getElementById('marketingForm').reset();
            btn.innerText = 'SIMPAN DATA KE SHEET';
            btn.disabled = false;
            setTimeout(fetchData, 2000); // Tunggu 2 detik baru refresh tabel
        });
    });

    // FUNGSI AMBIL DATA (DENGAN PROXY ALLORIGINS)
    function fetchData() {
        const proxyUrl = 'https://api.allorigins.win/get?url=';
        const targetUrl = encodeURIComponent(WEB_APP_URL);

        fetch(proxyUrl + targetUrl + '&cache=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const rawData = JSON.parse(data.contents);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (!rawData || rawData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Belum ada data laporan.</td></tr>';
                return;
            }

            rawData.forEach(row => {
                let statusText = row[5] || 'Menunggu';
                let stClass = 'st-menunggu';
                const s = statusText.toLowerCase();
                
                if(s.includes('tolak')) stClass = 'st-ditolak';
                else if(s.includes('tarik')) stClass = 'st-tertarik';
                else if(s.includes('bayar')) stClass = 'st-sudahbayar';
                else if(s.includes('trial')) stClass = 'st-taketrial';

                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td>
                    <td><b>${row[1]}</b></td>
                    <td>${row[2]}</td>
                    <td><span class="status ${stClass}">${statusText}</span></td>
                </tr>`;
            });
        })
        .catch(err => {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:red">Gagal memuat. Periksa koneksi.</td></tr>';
        });
    }

    // Jalankan pertama kali
    fetchData();
</script>

</body>
</html>

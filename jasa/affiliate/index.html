<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup & Lifestyle</title>
    
    <link rel="icon" type="image/png" href="/assets/img/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        /* Modern Card Styling */
        .product-card { 
            background: #ffffff; 
            border: 1px solid rgba(0,0,0,0.03); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.2);
        }

        #share-toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 0.75rem 1.5rem;
            border-radius: 1rem; font-size: 0.75rem; font-weight: bold; z-index: 1000; display: none;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="share-toast" class="animate__animated">Link Tersalin ke Clipboard! 📋</div>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] max-w-3xl w-full max-h-[90vh] overflow-y-auto custom-scroll p-8 md:p-12 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-indigo-600 text-3xl transition">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <nav class="py-6 px-10 flex justify-between items-center bg-white/70 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-50">
        <a href="../../index.html" class="group flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-indigo-600 transition">
            <span class="transform group-hover:-translate-x-1 transition-transform">←</span> Kembali
        </a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600 uppercase">Viel Picks.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-24 pb-12 px-6 text-center animate__animated animate__fadeIn">
        <span class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Curated Collection</span>
        <h1 id="page-title" class="text-5xl md:text-7xl font-extrabold text-slate-900 mb-6 tracking-tighter">Rekomendasi <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">Setup</span></h1>
        <p id="page-desc" class="text-slate-500 text-sm md:text-base max-w-xl mx-auto leading-relaxed">Upgrade ruang kerja dan gaya hidupmu dengan produk pilihan terbaik dari ekosistem Viel.</p>
    </header>

    <div class="max-w-2xl mx-auto mb-16 px-6 animate__animated animate__fadeInUp">
        <div class="relative group mb-8">
            <input type="text" id="product-search" onkeyup="searchProducts()" 
                   placeholder="Cari gadget, merk, atau outfit..." 
                   class="w-full bg-white border border-slate-200 rounded-3xl py-5 px-10 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all duration-300 shadow-sm">
            <div class="absolute right-8 top-5 text-slate-300 group-focus-within:text-indigo-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
        </div>
        
        <div id="brand-tags" class="flex flex-wrap justify-center gap-2"></div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center py-24 opacity-20">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-black uppercase tracking-[0.3em]">Syncing Collection...</p>
            </div>
        </div>
    </main>

    <script>
        let allProducts = []; 
        let filteredByUrl = []; 
        let currentBrandFilter = "";

        async function fetchAffiliate() {
            const container = document.getElementById('affiliate-grid');
            const urlParams = new URLSearchParams(window.location.search);
            const filterCat = urlParams.get('cat'); 

            const username = "VieleytaZen";
            const repo = "web-viel-serv";
            const folderPath = "jasa/affiliate/items";

            // Ganti bagian akhir fungsi fetchAffiliate() kamu dengan ini:
try {
    const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}?ref=main&cb=${Date.now()}`);
    const files = await res.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));
    const promises = jsonFiles.map(f => fetch(f.download_url).then(r => r.json()));
    allProducts = await Promise.all(promises);

    // Ambil parameter q dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('q'); 

    if (searchQuery) {
        // 1. Masukkan teks ke kolom input search secara visual
        const searchInput = document.getElementById('product-search');
        if (searchInput) searchInput.value = searchQuery;

        // 2. Filter produk berdasarkan query tersebut
        filteredByUrl = allProducts; // Kita ambil semua data dulu
        searchProducts(); // Jalankan fungsi search yang sudah ada
    } else {
        // Jika tidak ada query, tampilkan semua seperti biasa
        filteredByUrl = allProducts;
        renderProducts(allProducts);
          }
         } catch (e) {
       container.innerHTML = `<p class="col-span-full text-center text-slate-400 py-20 font-bold uppercase tracking-widest text-xs">Gagal memuat koleksi.</p>`;
        }
        }

        function generateBrandTags(products) {
            const tagContainer = document.getElementById('brand-tags');
            const brands = [...new Set(products.map(p => p.brand).filter(b => b && b !== ""))];
            if (brands.length === 0) return;

            let html = `<button onclick="filterByBrand('')" class="px-5 py-2 rounded-full text-[10px] font-bold border ${currentBrandFilter === '' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-400 border-slate-100'} transition">ALL</button>`;
            brands.forEach(brand => {
                html += `<button onclick="filterByBrand('${brand}')" class="px-5 py-2 rounded-full text-[10px] font-bold border ${currentBrandFilter === brand ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-400 border-slate-100'} transition uppercase tracking-widest">${brand}</button>`;
            });
            tagContainer.innerHTML = html;
        }

        function filterByBrand(brand) {
            currentBrandFilter = brand;
            searchProducts();
        }

        function searchProducts() {
            const query = document.getElementById('product-search').value.toLowerCase().trim();
            const results = filteredByUrl.filter(item => {
                const matchesSearch = !query || item.title.toLowerCase().includes(query) || (item.brand && item.brand.toLowerCase().includes(query));
                const matchesBrand = !currentBrandFilter || item.brand === currentBrandFilter;
                return matchesSearch && matchesBrand;
            });
            renderProducts(results, false);
        }

        function renderProducts(products, refreshTags = true) {
            const container = document.getElementById('affiliate-grid');
            if (refreshTags) generateBrandTags(products);
            
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-30 text-xs font-black uppercase tracking-widest">No products found.</div>`;
                return;
            }

            let html = '';
            products.forEach((item, index) => {
                const rating = item.rate ? `<div class="flex items-center gap-1 mb-2"><span class="text-yellow-400 text-[10px]">⭐</span><span class="text-[10px] font-bold text-slate-400">${item.rate}</span></div>` : '';
                
                html += `
                    <div onclick="openModal('${item.title}')" class="product-card group cursor-pointer rounded-[2.5rem] overflow-hidden animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="aspect-[4/5] overflow-hidden relative bg-slate-100">
                            <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <button onclick="shareProduct(event, '${item.link}')" class="absolute top-6 right-6 bg-white/90 backdrop-blur-md p-3 rounded-2xl shadow-sm hover:bg-indigo-600 hover:text-white transition-all opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0 z-10">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6a3 3 0 100-2.684m0 2.684l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                            </button>
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">${item.brand || 'Viel Picks'}</p>
                                    <h3 class="font-bold text-slate-800 text-sm leading-snug line-clamp-2">${item.title}</h3>
                                </div>
                            </div>
                            ${rating}
                            <div class="flex justify-between items-center pt-5 border-t border-slate-50 mt-4">
                                <span class="font-black text-slate-900 text-base">${item.price}</span>
                                <span class="text-indigo-600 text-[10px] font-black uppercase tracking-widest group-hover:translate-x-1 transition-transform">View →</span>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function openModal(title) {
            const item = allProducts.find(p => p.title === title);
            const modal = document.getElementById('product-modal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                <div class="grid md:grid-cols-2 gap-12 items-start">
                    <div class="aspect-[4/5] rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <img src="${item.image}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <div class="flex flex-wrap items-center gap-2 mb-6">
                            <span class="px-4 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest">${item.category || 'GEAR'}</span>
                            ${item.brand ? `<span class="px-4 py-1 bg-slate-50 text-slate-400 rounded-full text-[10px] font-black uppercase tracking-widest">${item.brand}</span>` : ''}
                            ${item.rate ? `<span class="text-sm font-bold text-slate-700 ml-2">⭐ ${item.rate}</span>` : ''}
                        </div>
                        <h2 class="text-4xl font-extrabold text-slate-900 mb-4 leading-tight">${item.title}</h2>
                        <p class="text-3xl font-black text-indigo-600 mb-8">${item.price}</p>
                        <div class="prose prose-sm text-slate-500 mb-10 leading-relaxed border-t border-slate-100 pt-8">
                            <p class="font-black text-slate-300 uppercase text-[9px] tracking-[0.2em] mb-4">Product Story</p>
                            ${item.desc || 'Produk pilihan terbaik yang dikurasi untuk menunjang produktivitas dan gaya hidup digitalmu.'}
                        </div>
                        <a href="${item.link}" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-6 rounded-3xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition transform hover:scale-[1.02] active:scale-95 uppercase tracking-widest text-xs">Cek Produk</a>
                    </div>
                </div>`;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function shareProduct(e, link) {
            e.stopPropagation();
            navigator.clipboard.writeText(link).then(() => {
                const toast = document.getElementById('share-toast');
                toast.style.display = 'block';
                toast.classList.add('animate__fadeInUp');
                setTimeout(() => {
                    toast.classList.replace('animate__fadeInUp', 'animate__fadeOutDown');
                    setTimeout(() => { toast.style.display = 'none'; toast.classList.remove('animate__fadeOutDown'); }, 500);
                }, 2000);
            });
        }

        window.onload = fetchAffiliate;
    </script>
</body>
</html>

backend:
  name: git-gateway
  branch: main

local_backend: true 

media_folder: "assets/img"
public_folder: "/assets/img"

# Mengaktifkan fitur pencarian global di admin panel
search: true

collections:
  - name: "affiliate"
    label: "🛒 Produk Affiliate"
    folder: "jasa/affiliate/items"
    extension: "json"
    create: true
    slug: "{{title}}"
    summary: "{{title}} ({{brand}}) - {{price}}" # Memudahkan melihat list produk
    fields:
      - {label: "Nama Produk", name: "title", widget: "string"}
      - {label: "Harga", name: "price", widget: "string"}
      - label: "Jenis Produk (Kategori)"
        name: "category"
        widget: "select"
        options: ["Digital", "Pakaian", "Aksesoris"]
        required: true
      - label: "Merk / Brand"
        name: "brand"
        widget: "select"
        options: 
          - { label: "--- DIGITAL ---", value: "" }
          - "Apple"
          - "Samsung"
          - "Xiaomi"
          - "Sony"
          - "Logitech"
          - "Asus"
          - { label: "--- PAKAIAN ---", value: "" }
          - "Nike"
          - "Adidas"
          - "Uniqlo"
          - "Erigo"
          - "H&M"
          - { label: "--- AKSESORIS ---", value: "" }
          - "Robot"
          - "Aukey"
          - "Baseus"
          - "Ugreen"
        allow_add: true 
        required: false
        hint: "Pilih merk sesuai jenis produk di atas"
      - label: "Sub-Kategori"
        name: "sub"
        widget: "select"
        options: 
          - { label: "--- GADGET/DIGITAL ---", value: "" }
          - "Smartphone"
          - "Laptop"
          - "Tablet"
          - "Software"
          - "Headset"
          - { label: "--- CLOTHING ---", value: "" }
          - "Baju"
          - "Celana"
          - "Hoodie"
          - "Jaket"
          - { label: "--- PERIPHERAL ---", value: "" }
          - "Mouse"
          - "Keyboard"
          - "Charger"
        allow_add: true
        required: false
      - {label: "Rate Produk (1-5)", name: "rate", widget: "number", value_type: "float", min: 1, max: 5, step: 0.1, required: false}
      - {label: "Deskripsi Produk", name: "desc", widget: "markdown", required: false}
      - {label: "Link Shopee/Affiliate", name: "link", widget: "string"}
      - {label: "Foto Produk", name: "image", widget: "image"}

  - name: "jasa_coding"
    label: "💻 Jasa Coding"
    files:
      - label: "Data Jasa Coding"
        name: "jasa_coding"
        file: "jasa/data.json"
        fields:
          - name: "digital"
            label: "List Jasa"
            widget: "list"
            summary: "{{title}} - {{price}}"
            fields:
              - {label: "ID (Penting: web-dev/bot-dev/landing-page)", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Desc Singkat", name: "desc", widget: "string"}
              - {label: "Detail (HTML)", name: "detail", widget: "text"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Link WA", name: "waLink", widget: "string"}

  - name: "jasa_cleaning"
    label: "🧹 Jasa Cleaning"
    files:
      - label: "Data Cleaning"
        name: "jasa_cleaning"
        file: "cleaning/data.json"
        fields:
          - name: "cleaning"
            label: "List Cleaning"
            widget: "list"
            summary: "{{title}} - {{price}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Desc Singkat", name: "desc", widget: "string"}
              - {label: "Detail", name: "detail", widget: "text"}
              - {label: "Price", name: "price", widget: "string"}
              - {label: "Link WA", name: "waLink", widget: "string"}

  - name: "projects"
    label: "📊 Project Tracker"
    folder: "jasa/projects"
    extension: "json"
    create: true
    slug: "{{order_id}}"
    summary: "[{{status}}] {{order_id}} - {{client_name}}"
    fields:
      - {label: "Order ID (Contoh: VIEL-001)", name: "order_id", widget: "string"}
      - {label: "Nama Client", name: "client_name", widget: "string"}
      - {label: "Nama Project", name: "title", widget: "string"}
      - label: "Status Project"
        name: "status"
        widget: "select"
        options: ["Queue", "Research", "Coding", "Testing", "Deployment", "Done"]
      - {label: "Progress (%)", name: "progress", widget: "number", min: 0, max: 100}
      - {label: "Estimasi Selesai", name: "eta", widget: "string", hint: "Contoh: 25 Maret 2026"}
      - {label: "Catatan Progress", name: "note", widget: "string", required: false}

  - name: "docs"
    label: "📚 Panduan Admin"
    delete: false
    editor:
      preview: false
    files:
      - label: "Cara Pakai Admin"
        name: "manual"
        file: "admin/README_ADMIN.md"
        fields:
          - {label: "Isi Panduan", name: "body", widget: "markdown"}
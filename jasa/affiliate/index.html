<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600">VIEL PICKS.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3">Rekomendasi Setup</h1>
        <p class="text-slate-400">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        let allProducts = [];

async function fetchAffiliate() {
    const container = document.getElementById('affiliate-grid');
    const username = "VieleytaZen";
    const repo = "web-viel-serv";
    // Sesuaikan path ini dengan folder di GitHub kamu
    const folderPath = "jasa/affiliate/items"; 

    try {
        // Gunakan parameter ?ref=main untuk memastikan mengambil dari branch utama
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}?ref=main`);
        
        if (!response.ok) throw new Error("Folder tidak ditemukan di GitHub");
        
        const files = await response.json();
        const jsonFiles = files.filter(file => file.name.endsWith('.json'));

        const promises = jsonFiles.map(file => fetch(file.download_url).then(res => res.json()));
        const allProducts = await Promise.all(promises);

        renderProducts(allProducts);
    } catch (e) {
        console.error("Detail Error:", e);
        container.innerHTML = `<p class='text-center col-span-full text-slate-600 uppercase tracking-widest text-[10px]'>
            Gagal memuat produk. <br> <span class="text-[8px] opacity-50">Error: ${e.message}</span>
        </p>`;
    }
}

async function renderJasa() {
    const container = document.getElementById('jasa-grid');
    try {
        const response = await fetch('data.json?v=' + Date.now());
        const data = await response.json();
        
        // Pastikan mengambil array 'digital'
        window.currentData = data.digital || []; 

        let html = '';
        window.currentData.forEach((item, index) => {
            // PENGAMAN: Jika id tidak ada, buat string kosong agar .includes tidak error
            const itemId = item.id || "";
            const icon = itemId.includes('web') ? '🌐' : '🤖';
            
            html += `
                <div class="bg-white/70 backdrop-blur-md p-10 rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                    <div class="flex justify-between items-start mb-8">
                        <div class="text-5xl">${icon}</div>
                        <span class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">${item.price || 'Price TBA'}</span>
                    </div>
                    <h3 class="text-2xl font-black text-slate-900 mb-4">${item.title || 'Untitled Service'}</h3>
                    <p class="text-slate-500 mb-8 leading-relaxed text-sm">${item.desc || ''}</p>
                    <button onclick="openModal('${itemId}')" class="font-bold text-indigo-600 hover:text-indigo-800 transition flex items-center gap-2 group text-sm">
                        Cek Detail <span class="group-hover:translate-x-1 transition-transform">→</span>
                    </button>
                </div>`;
        });
        
        container.innerHTML = html || "<p class='col-span-full text-center py-20 text-slate-400'>Belum ada layanan.</p>";
    } catch (e) { 
        console.error("Gagal memuat data coding:", e);
        container.innerHTML = "<p class='col-span-full text-center py-20 text-red-400 font-bold'>Gagal memuat data. Periksa koneksi atau format JSON.</p>";
    }
}

// Fungsi filter tetap sama seperti sebelumnya
function filterProducts(category) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.innerText === category.toUpperCase()) btn.classList.add('active');
    });

    if (category === 'All') {
        renderProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === category);
        renderProducts(filtered);
    }
}

window.onload = fetchAffiliate;
    </script>
</body>
</html>

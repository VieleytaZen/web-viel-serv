<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KostClean | Jasa Bersih Kost Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <nav class="sticky top-0 z-[100] py-4 bg-white/80 backdrop-blur-md border-b">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="../index.html" class="font-bold text-slate-500 hover:text-blue-600 text-sm">← Kembali</a>
            <span class="text-xl font-extrabold text-blue-600">KostClean</span>
        </div>
    </nav>

    <header class="py-24 text-center px-6">
        <h2 class="text-5xl font-extrabold mb-6 leading-tight">Kost Bersih, <br><span class="text-blue-600 bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent">Istirahat Jadi Puas.</span></h2>
    </header>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <div id="cleaning-grid" class="grid md:grid-cols-3 gap-8"></div>
    </section>

    <div id="modal-cleaning" class="fixed inset-0 bg-slate-900/60 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-10 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeCleaningModal()" class="absolute top-6 right-6 text-slate-400 text-3xl">&times;</button>
            <div id="cleaning-content"></div>
            <div class="mt-10"><a id="cleaning-cta" href="#" target="_blank" class="block w-full bg-blue-600 text-white py-5 rounded-2xl font-extrabold text-center">Pesan via WhatsApp</a></div>
        </div>
    </div>

    <script>
        async function renderCleaning() {
            const container = document.getElementById('cleaning-grid');
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                window.cleaningData = data.cleaning;

                let html = '';
                data.cleaning.forEach((item, index) => {
                    const isDeep = item.id === 'deep';
                    html += `
                        <div class="service-card p-10 rounded-[2.5rem] transition-all duration-300 ${isDeep ? 'bg-blue-600 shadow-2xl text-white' : 'bg-white border border-slate-100 shadow-sm'} animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                            <h3 class="text-2xl font-extrabold mb-4">${item.title}</h3>
                            <p class="${isDeep ? 'text-blue-100' : 'text-slate-500'} mb-8 leading-relaxed">${item.desc}</p>
                            <div class="text-3xl font-black mb-8">${item.price}</div>
                            <button onclick="openCleaningModalJSON('${item.id}')" class="w-full py-4 rounded-2xl font-bold ${isDeep ? 'bg-white text-blue-600' : 'bg-slate-900 text-white'}">Detail</button>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }

        function openCleaningModalJSON(id) {
            const item = window.cleaningData.find(c => c.id === id);
            if(item) {
                document.getElementById('cleaning-content').innerHTML = `<h2 class="text-3xl font-black mb-6">${item.title}</h2><div class="text-slate-600">${item.detail}</div>`;
                document.getElementById('cleaning-cta').href = item.waLink;
                document.getElementById('modal-cleaning').classList.remove('hidden');
            }
        }
        function closeCleaningModal() { document.getElementById('modal-cleaning').classList.add('hidden'); }
        document.addEventListener('DOMContentLoaded', renderCleaning);
    </script>
</body>
</html>

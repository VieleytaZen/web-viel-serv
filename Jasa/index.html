<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasa Digital & Rekomendasi Gadget | Viel Portfolio</title>
    <meta name="description" content="Jasa desain social media, pembuatan landing page kilat, dan rekomendasi produk e-commerce pilihan Viel.">
    <meta name="keywords" content="jasa desain grafis, landing page murah, rekomendasi gadget, affiliate viel">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .card-modern { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-modern:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900">
    <nav class="glass-nav sticky top-0 z-50 py-4">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="../index.html" class="font-bold text-slate-500 hover:text-indigo-600">← Kembali</a>
            <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Viel Portfolio</h1>
        </div>
    </nav>

    <header class="py-20 text-center animate__animated animate__fadeIn">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Solusi Digital Kreatif</h2>
        <p class="text-slate-500 max-w-xl mx-auto">Membantu kebutuhan visual dan digital kamu dengan hasil maksimal.</p>
    </header>

    <section id="jasa" class="max-w-6xl mx-auto py-12 px-6">
        <div id="jasa-grid" class="grid md:grid-cols-2 gap-8"></div>
    </section>

    <section id="produk" class="bg-slate-50 py-20 px-6">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-3xl font-extrabold mb-12 text-center text-slate-800">Rekomendasi Pilihan</h2>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="animate__animated animate__zoomIn bg-white rounded-[3rem] max-w-lg w-full p-12 relative shadow-2xl text-center">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-3xl transition">&times;</button>
            <div id="modal-content"></div>
            <div class="mt-10"><a id="modal-cta" href="#" target="_blank" class="block w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">Hubungi WhatsApp</a></div>
        </div>
    </div>

    <script>
        function renderJasa() {
            const container = document.getElementById('jasa-grid');
            if(!container || !DB_SERVICES.digital) return;
            let html = '';
            DB_SERVICES.digital.forEach((item, index) => {
                html += `
                    <div class="card-modern bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm animate__animated animate__fadeInUp">
                        <h3 class="text-2xl font-bold mb-4">${item.title}</h3>
                        <p class="text-slate-500 mb-8">${item.desc}</p>
                        <button onclick="openModal('${item.id}')" class="text-indigo-600 font-black tracking-widest text-xs uppercase">Lihat Detail →</button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function renderProducts() {
            const container = document.getElementById('product-grid');
            if(!container || !DB_SERVICES.products) return;
            let html = '';
            DB_SERVICES.products.forEach(item => {
                html += `
                    <div class="card-modern bg-white rounded-[2rem] overflow-hidden shadow-sm flex flex-col">
                        <div class="h-48 bg-slate-100 overflow-hidden">
                            <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-6">
                            <h4 class="font-bold text-slate-900 mb-4">${item.title}</h4>
                            <div class="flex items-center justify-between border-t pt-4">
                                <span class="font-bold text-indigo-600">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="bg-slate-900 text-white p-2 rounded-lg">Cek</a>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function openModal(id) {
            const item = DB_SERVICES.digital.find(d => d.id === id);
            if(item) {
                document.getElementById('modal-content').innerHTML = `<h2 class="text-3xl font-black mb-4">${item.title}</h2><p class="text-slate-500">${item.detail}</p>`;
                document.getElementById('modal-cta').href = item.waLink;
                document.getElementById('modal-container').classList.remove('hidden');
            }
        }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        document.addEventListener('DOMContentLoaded', () => { renderJasa(); renderProducts(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600">VIEL PICKS.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3">Rekomendasi Setup</h1>
        <p class="text-slate-400">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        async function renderAffiliate() {
            const container = document.getElementById('affiliate-grid');
            try {
                // Fetch data dari folder affiliate
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();

                let html = '';
                data.forEach((item, index) => {
                    html += `
                        <div class="group animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                            <div class="aspect-square rounded-[2rem] overflow-hidden bg-slate-100 mb-6">
                                <img src="${item.image}" class="w-full h-full object-cover transition-transform duration-700">
                            </div>
                            <div class="px-2">
                                <span class="text-[10px] font-black uppercase tracking-widest text-indigo-500 mb-2 block">${item.category || 'Gear'}</span>
                                <h3 class="font-bold text-slate-800 text-lg mb-2 leading-tight">${item.title}</h3>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="font-black text-slate-900">${item.price}</span>
                                    <a href="${item.link}" target="_blank" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-600 transition shadow-lg">Beli Sekarang</a>
                                </div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }
        window.onload = renderAffiliate;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Coding | Viel Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s; }
        .glass-card:hover { border-color: #6366f1; transform: translateY(-5px); background: rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="jasa-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-[#1e293b] border border-slate-700 rounded-[2.5rem] max-w-lg w-full p-8 md:p-10 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white text-3xl transition">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-800 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-50">
        <a href="../index.html" class="text-sm font-bold text-slate-500 hover:text-indigo-400 transition">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-500 uppercase">Viel Coding.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-16 px-6 text-center animate__animated animate__fadeIn">
        <h1 id="page-title" class="text-4xl md:text-6xl font-extrabold text-white mb-4 tracking-tight">Layanan Coding</h1>
        <p id="page-desc" class="text-slate-400 text-sm max-w-lg mx-auto leading-relaxed">Solusi koding profesional untuk otomasi dan kehadiran digital Anda.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="jasa-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        let currentJasa = [];

        async function fetchJasa() {
            const container = document.getElementById('jasa-grid');
            const urlParams = new URLSearchParams(window.location.search);
            const filterType = urlParams.get('filter'); 

            try {
                const res = await fetch('data.json');
                const data = await res.json();
                currentJasa = data.digital;
                let listToShow = currentJasa;

                if (filterType) {
                    listToShow = currentJasa.filter(item => item.id === filterType);
                    document.getElementById('page-title').innerText = filterType.replace('-', ' ').toUpperCase();
                }

                let html = '';
                listToShow.forEach((item, index) => {
                    let icon = item.id.includes('bot') ? '🤖' : '🌐';
                    html += `
                        <div class="glass-card p-8 rounded-[2.5rem] flex flex-col animate__animated animate__fadeInUp">
                            <div class="text-4xl mb-6">${icon}</div>
                            <h3 class="text-xl font-bold text-white mb-3">${item.title}</h3>
                            <p class="text-slate-400 text-sm mb-8 flex-1 leading-relaxed">${item.desc}</p>
                            <div class="flex justify-between items-center pt-6 border-t border-slate-800">
                                <span class="font-black text-indigo-400 text-lg">${item.price}</span>
                                <button onclick="openModal('${item.title.replace(/'/g, "\\'")}')" class="text-white text-[10px] font-bold uppercase tracking-[0.2em] hover:text-indigo-400 transition">
                                    Detail →
                                </button>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = "<p class='text-center col-span-full'>Gagal memuat data.</p>";
            }
        }

        function openModal(title) {
            const item = currentJasa.find(j => j.title === title);
            if (!item) return;

            const modal = document.getElementById('jasa-modal');
            const content = document.getElementById('modal-content');

            content.innerHTML = `
                <p class="text-indigo-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">Service Detail</p>
                <h2 class="text-3xl font-black text-white mb-6 leading-tight">${item.title}</h2>
                <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 mb-8">
                    <p class="text-slate-300 text-sm leading-relaxed whitespace-pre-line">${item.detail || 'Tidak ada detail tambahan.'}</p>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-xs font-bold uppercase uppercase tracking-widest">Starting Price</span>
                        <span class="text-2xl font-black text-white">${item.price}</span>
                    </div>
                    <a href="${item.waLink}" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-4 rounded-xl font-black uppercase tracking-widest text-xs hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/20">
                        Pesan Sekarang
                    </a>
                </div>
            `;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('jasa-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onload = fetchJasa;
    </script>
</body>
</html>

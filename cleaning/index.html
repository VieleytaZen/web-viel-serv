<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KostClean | Jasa Bersih Kost Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <nav class="sticky top-0 z-[100] py-4 bg-white/80 backdrop-blur-md border-b">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="../index.html" class="font-bold text-slate-500 hover:text-blue-600 text-sm transition">← Kembali</a>
            <span class="text-xl font-extrabold text-blue-600">KostClean</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <header class="py-24 text-center px-6 animate__animated animate__fadeIn">
        <h2 class="text-5xl font-extrabold mb-6 leading-tight">Kost Bersih, <br><span class="text-blue-600 bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent">Istirahat Jadi Puas.</span></h2>
        <p class="text-slate-500 text-sm uppercase tracking-[0.3em] font-bold">Layanan Kebersihan Viel Service</p>
    </header>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <div id="cleaning-grid" class="grid md:grid-cols-3 gap-8">
            </div>
    </section>

    <div id="modal-cleaning" class="fixed inset-0 bg-slate-900/60 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-10 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeCleaningModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 text-3xl transition">&times;</button>
            <div id="cleaning-content"></div>
            <div class="mt-10">
                <a id="cleaning-cta" href="#" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-extrabold text-center shadow-lg shadow-blue-200 transition transform hover:scale-[1.02]">Pesan via WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        window.cleaningData = [];

        async function renderCleaning() {
            const container = document.getElementById('cleaning-grid');
            try {
                // Anti-cache agar data CMS langsung update
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error("Data tidak ditemukan");
                
                const data = await response.json();
                window.cleaningData = data.cleaning || [];

                let html = '';
                window.cleaningData.forEach((item, index) => {
                    // Pengaman ID agar tidak error saat pengecekan .includes
                    const safeId = (item.id || "clean").toLowerCase();
                    const isDeep = safeId.includes('deep');
                    
                    html += `
                        <div class="service-card p-10 rounded-[2.5rem] transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 animate__animated animate__fadeInUp shadow-sm" 
                             style="animation-delay: ${index * 0.1}s; ${isDeep ? 'background-color: #2563eb; color: white;' : 'background-color: white; border: 1px solid #f1f5f9;'}">
                            <div class="mb-6">
                                <span class="text-[10px] font-black uppercase tracking-widest ${isDeep ? 'text-blue-200' : 'text-blue-600'}">${isDeep ? 'Premium Choice' : 'Regular Service'}</span>
                            </div>
                            <h3 class="text-2xl font-extrabold mb-4">${item.title || 'Layanan Bersih'}</h3>
                            <p class="${isDeep ? 'text-blue-100' : 'text-slate-500'} mb-8 leading-relaxed text-sm">${item.desc || ''}</p>
                            <div class="text-3xl font-black mb-8">${item.price || 'TBA'}</div>
                            <button onclick="openCleaningModalJSON('${item.id}')" 
                                    class="w-full py-4 rounded-2xl font-bold transition-all ${isDeep ? 'bg-white text-blue-600 hover:bg-blue-50' : 'bg-slate-900 text-white hover:bg-slate-800'}">
                                Detail Layanan
                            </button>
                        </div>`;
                });
                container.innerHTML = html || "<p class='col-span-full text-center text-slate-400 py-10 uppercase tracking-widest text-xs font-bold'>Belum ada paket cleaning tersedia.</p>";
            } catch (e) { 
                console.error("Gagal memuat data cleaning:", e);
                container.innerHTML = "<p class='col-span-full text-center text-red-500 py-10 font-bold'>Gagal memuat database layanan.</p>";
            }
        }

        function openCleaningModalJSON(id) {
            const item = window.cleaningData.find(c => c.id === id);
            if(item) {
                document.getElementById('cleaning-content').innerHTML = `
                    <div class="text-blue-600 text-[10px] font-black uppercase tracking-[0.3em] mb-4">Service Detail</div>
                    <h2 class="text-3xl font-black mb-6 text-slate-900">${item.title}</h2>
                    <div class="text-left bg-slate-50 p-6 rounded-2xl text-slate-600 text-sm leading-relaxed whitespace-pre-line border border-slate-100">${item.detail || 'Tidak ada detail untuk paket ini.'}</div>`;
                document.getElementById('cleaning-cta').href = item.waLink || 'https://wa.me/628...';
                document.getElementById('modal-cleaning').classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Lock scroll
            }
        }

        function closeCleaningModal() { 
            document.getElementById('modal-cleaning').classList.add('hidden'); 
            document.body.style.overflow = 'auto'; // Unlock scroll
        }

        document.addEventListener('DOMContentLoaded', renderCleaning);
    </script>
</body>
</html>

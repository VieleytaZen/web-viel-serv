<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        
        .glass-nav { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .card-modern {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-modern:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15);
        }

        .nav-link {
            position: relative;
            transition: color 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: #4f46e5;
            transition: width 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900">

    <nav class="glass-nav sticky top-0 z-50 py-5">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="group flex items-center gap-2 text-slate-400 hover:text-indigo-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    <span class="font-bold">Home</span>
                </a>
                <div class="h-6 w-[1px] bg-gray-200"></div>
                <span class="text-xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Viel Digital</span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 font-bold text-sm tracking-wide text-slate-600 uppercase">
                <a href="#jasa" class="nav-link">Layanan Jasa</a>
                <a href="affiliate/index.html" class="nav-link text-indigo-600">Produk Affiliate ✨</a>
                <a href="https://wa.me/6282133692292" target="_blank" class="bg-indigo-600 text-white px-6 py-2.5 rounded-full hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Konsultasi</a>
            </div>
        </div>
    </nav>

    <header class="py-24 bg-white border-b border-slate-50 relative overflow-hidden">
        <div class="max-w-4xl mx-auto text-center px-6 relative z-10 animate__animated animate__fadeIn">
            <span class="inline-block px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Software Development</span>
            <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">
                Ubah Ide Menjadi<br><span class="text-indigo-600 italic">Produk Digital.</span>
            </h1>
            <p class="text-lg text-slate-500 max-w-2xl mx-auto leading-relaxed">
                Menyediakan jasa pembuatan website modern dan automasi bot dengan performa tinggi untuk mendukung bisnismu.
            </p>
        </div>
    </header>

    <section id="jasa" class="max-w-6xl mx-auto py-24 px-6">
        <div class="flex items-center gap-6 mb-16">
            <h2 class="text-3xl font-extrabold tracking-tight">Layanan Coding</h2>
            <div class="h-[2px] flex-1 bg-slate-100"></div>
        </div>

        <div id="jasa-grid" class="grid md:grid-cols-2 gap-10">
            </div>
    </section>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="animate__animated animate__zoomIn bg-white rounded-[3rem] max-w-lg w-full p-12 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-3xl transition">&times;</button>
            <div id="modal-content"></div>
            <div class="mt-10">
                <a id="modal-cta" href="#" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-4 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Diskusikan Project</a>
            </div>
        </div>
    </div>

    <footer class="bg-white py-16 text-center border-t border-slate-100">
        <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">&copy; 2026 Viel Service | by Viel</p>
    </footer>

    <script>
        function renderJasa() {
            const container = document.getElementById('jasa-grid');
            // Cek apakah data tersedia
            if(!container || typeof DB_SERVICES === 'undefined' || !DB_SERVICES.digital) {
                console.error("Data DB_SERVICES.digital tidak ditemukan!");
                return;
            }

            let html = '';
            DB_SERVICES.digital.forEach((item, index) => {
                // Logika Ikon agar tidak undefined
                let iconSvg = '';
                if(item.id === 'web-dev') {
                    iconSvg = '<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>';
                } else {
                    iconSvg = '<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>';
                }

                html += `
                    <div class="card-modern bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                        <div class="flex justify-between items-start mb-8">
                            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                                ${iconSvg}
                            </div>
                            <span class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1 rounded-full">${item.price}</span>
                        </div>
                        <h3 class="text-2xl font-black mb-4">${item.title}</h3>
                        <p class="text-slate-500 mb-8 leading-relaxed">${item.desc}</p>
                        <button onclick="openModal('${item.id}')" class="text-indigo-600 font-black flex items-center gap-2 group tracking-widest text-xs">
                            CEK DETAIL <span class="group-hover:translate-x-2 transition-transform">→</span>
                        </button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function openModal(id) {
            const item = DB_SERVICES.digital.find(d => d.id === id);
            if(item) {
                document.getElementById('modal-content').innerHTML = `
                    <h2 class="text-3xl font-black text-slate-900 mb-6">${item.title}</h2>
                    <div class="text-left bg-slate-50 p-8 rounded-[2rem] text-slate-600 leading-relaxed">
                        ${item.detail}
                    </div>
                `;
                document.getElementById('modal-cta').href = item.waLink;
                document.getElementById('modal-container').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        // Jalankan render setelah halaman siap
        document.addEventListener('DOMContentLoaded', renderJasa);
    </script>
</body>
</html>

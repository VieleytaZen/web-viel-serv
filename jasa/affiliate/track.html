<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Project | Viel Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-fill { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full text-center">
        <a href="../index.html" class="text-xs font-bold text-slate-500 hover:text-indigo-400 mb-10 inline-block uppercase tracking-[0.3em]">← Kembali</a>
        <h1 class="text-4xl font-black mb-2 tracking-tighter uppercase">Project <span class="text-indigo-500">Tracker</span></h1>
        <p class="text-slate-400 text-sm mb-10 leading-relaxed">Masukkan Order ID untuk melihat progres pengerjaan.</p>

        <div class="glass p-8 rounded-[2.5rem] mb-10">
            <input type="text" id="order-id" placeholder="VIEL-XXX" 
                   class="w-full bg-[#0f172a] border border-slate-700 rounded-2xl py-4 px-6 text-center text-white font-bold uppercase tracking-widest focus:outline-none focus:border-indigo-500 transition mb-4">
            <button onclick="trackProject()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-indigo-700 transition active:scale-95">Check Progress</button>
        </div>

        <div id="result-container" class="hidden animate__animated animate__fadeIn">
            <div id="project-card" class="glass p-8 rounded-[2.5rem] text-left">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p id="res-client" class="text-[10px] text-indigo-400 font-black uppercase tracking-widest mb-1"></p>
                        <h3 id="res-title" class="text-xl font-bold text-white"></h3>
                    </div>
                    <span id="res-status" class="bg-indigo-500/20 text-indigo-400 text-[9px] px-3 py-1 rounded-full font-bold uppercase tracking-widest"></span>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                        <span>Progress</span>
                        <span id="res-percent"></span>
                    </div>
                    <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                        <div id="res-bar" class="progress-fill h-full bg-gradient-to-r from-indigo-600 to-purple-500" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-4 pt-6 border-t border-slate-800">
                    <div>
                        <p class="text-[9px] text-slate-500 font-bold uppercase">Estimasi Selesai:</p>
                        <p id="res-eta" class="text-sm font-bold text-slate-200"></p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-500 font-bold uppercase">Catatan:</p>
                        <p id="res-note" class="text-xs text-slate-400 leading-relaxed italic"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="error-msg" class="hidden text-red-400 text-xs font-bold uppercase tracking-widest mt-4">Order ID tidak ditemukan!</div>
    </div>

    <script>
        async function trackProject() {
            const input = document.getElementById('order-id').value.toUpperCase().trim();
            const resultBox = document.getElementById('result-container');
            const errorBox = document.getElementById('error-msg');
            
            if(!input) return;

            try {
                // Mencoba mengambil file JSON berdasarkan Order ID
                const response = await fetch(`projects/${input}.json`);
                if(!response.ok) throw new Error("Not Found");
                
                const data = await response.json();
                
                // Isi Data
                document.getElementById('res-client').innerText = data.client_name;
                document.getElementById('res-title').innerText = data.title;
                document.getElementById('res-status').innerText = data.status;
                document.getElementById('res-percent').innerText = data.progress + "%";
                document.getElementById('res-eta').innerText = data.eta;
                document.getElementById('res-note').innerText = data.note || "Proses pengerjaan lancar.";
                
                // Tampilkan & Animasikan Bar
                errorBox.classList.add('hidden');
                resultBox.classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('res-bar').style.width = data.progress + "%";
                }, 100);

            } catch (e) {
                resultBox.classList.add('hidden');
                errorBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>

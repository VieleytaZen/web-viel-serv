<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600">VIEL PICKS.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3">Rekomendasi Setup</h1>
        <p class="text-slate-400">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        let allProducts = [];

async function fetchAffiliate() {
    const container = document.getElementById('affiliate-grid');
    // Ganti username dan repo sesuai akunmu
    const username = "VieleytaZen";
    const repo = "web-viel-serv";
    const folderPath = "jasa/affiliate/items";

    try {
        // 1. Ambil daftar file dari GitHub API
        const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
        const files = await response.json();

        // 2. Filter hanya file yang berakhiran .json
        const jsonFiles = files.filter(file => file.name.endsWith('.json'));

        // 3. Ambil isi konten dari setiap file tersebut
        const promises = jsonFiles.map(file => fetch(file.download_url).then(res => res.json()));
        allProducts = await Promise.all(promises);

        renderProducts(allProducts);
    } catch (e) {
        console.error("Error fetching items:", e);
        container.innerHTML = "<p class='text-center col-span-full text-slate-600 uppercase tracking-widest text-xs'>Gagal memuat produk atau folder masih kosong.</p>";
    }
}

function renderProducts(products) {
    const container = document.getElementById('affiliate-grid');
    let html = '';
    
    if (products.length === 0) {
        container.innerHTML = "<p class='text-center col-span-full text-slate-600 uppercase tracking-widest text-xs'>Belum ada produk.</p>";
        return;
    }

    products.forEach((item, index) => {
        html += `
            <div class="group glass rounded-[2rem] overflow-hidden hover:scale-[1.02] transition-all duration-500 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                <div class="aspect-square overflow-hidden bg-slate-800">
                    <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-indigo-400">${item.category}</span>
                        <span class="text-[9px] font-bold text-slate-500 italic">${item.sub || ''}</span>
                    </div>
                    <h3 class="font-bold text-white text-base mb-4 leading-tight">${item.title}</h3>
                    <div class="flex justify-between items-center pt-4 border-t border-slate-800">
                        <span class="font-black text-white text-sm">${item.price}</span>
                        <a href="${item.link}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-[10px] font-black transition shadow-lg shadow-indigo-500/20">BELI</a>
                    </div>
                </div>
            </div>`;
    });
    container.innerHTML = html;
}

// Fungsi filter tetap sama seperti sebelumnya
function filterProducts(category) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.innerText === category.toUpperCase()) btn.classList.add('active');
    });

    if (category === 'All') {
        renderProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === category);
        renderProducts(filtered);
    }
}

window.onload = fetchAffiliate;
    </script>
</body>
</html>

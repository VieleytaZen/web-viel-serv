<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Digital | Jasa Coding Profesional</title>
    <link rel="icon" type="image/png" href="/assets/img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #f1f5f9; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { border-color: #6366f1; transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600 uppercase">Viel Coding.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-16 px-6 text-center animate__animated animate__fadeIn">
        <h1 id="page-title" class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-4 tracking-tight">Jasa Coding</h1>
        <p id="page-desc" class="text-slate-400 text-sm max-w-lg mx-auto leading-relaxed">Solusi koding profesional untuk otomasi dan kehadiran digital Anda.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="jasa-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center text-slate-300 text-xs animate-pulse uppercase tracking-widest py-20">Memuat layanan...</p>
        </div>
    </main>

    <script>
        async function fetchJasa() {
            const container = document.getElementById('jasa-grid');
            const titleHeader = document.getElementById('page-title');
            const descHeader = document.getElementById('page-desc');

            // Ambil parameter ?filter= dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const filterType = urlParams.get('filter'); 

            try {
                // Fetch data dari data.json di folder yang sama
                const res = await fetch('data.json');
                const data = await res.json();
                let listJasa = data.digital;

                // Logika Filter
                if (filterType) {
                    listJasa = data.digital.filter(item => item.id === filterType);
                    
                    // Update Text Berdasarkan Filter
                    if (filterType === 'bot-dev') {
                        titleHeader.innerText = "WhatsApp Bot";
                        descHeader.innerText = "Sistem otomasi pesan untuk bisnis dan produktivitas.";
                    } else if (filterType === 'landing-page') {
                        titleHeader.innerText = "Landing Page";
                        descHeader.innerText = "Satu halaman fokus untuk konversi dan promosi maksimal.";
                    } else if (filterType === 'web-dev') {
                        titleHeader.innerText = "Website";
                        descHeader.innerText = "Website profesional multi-halaman untuk skala bisnis besar.";
                    }
                }

                renderJasa(listJasa);
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p class="col-span-full text-center text-slate-400 text-xs py-20 uppercase tracking-widest font-bold">Gagal memuat data layanan.</p>`;
            }
        }

        function renderJasa(items) {
            const container = document.getElementById('jasa-grid');
            let html = '';

            if (!items || items.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-slate-400 text-xs py-20 uppercase tracking-widest font-bold">Layanan belum tersedia.</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Pilih Ikon berdasarkan ID
                let icon = '⚡';
                if (item.id === 'bot-dev') icon = '🤖';
                if (item.id === 'landing-page') icon = '📄';
                if (item.id === 'web-dev') icon = '🌐';

                html += `
                    <div class="glass-card p-8 rounded-[2.5rem] animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                        <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl mb-6">
                            ${icon}
                        </div>
                        <h3 class="text-xl font-bold text-slate-900 mb-3">${item.title}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6">${item.desc}</p>
                        
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                            <span class="font-black text-indigo-600 text-lg">${item.price}</span>
                            <a href="${item.waLink}" target="_blank" class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-[10px] font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 uppercase tracking-widest">Pesan</a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.onload = fetchJasa;
    </script>
</body>
</html>

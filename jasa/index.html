<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Digital | Professional Web & Bot Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script>
        const script = document.createElement('script');
        script.src = 'data.js?v=' + Date.now(); // Memaksa ambil data terbaru
        document.head.appendChild(script);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .card-modern { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-modern:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(79, 70, 229, 0.15); }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-900">

    <nav class="glass-nav sticky top-0 z-50 py-4">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="text-slate-400 hover:text-indigo-600 transition text-sm font-bold">← Home</a>
            <div class="h-5 w-[1px] bg-gray-200"></div>
            <span class="text-lg font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Viel Digital</span>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="affiliate/index.html" class="text-indigo-600 font-bold text-[10px] md:text-sm uppercase tracking-tighter md:tracking-normal">
                Affiliate ✨
            </a>
            <a href="https://wa.me/6282133692292" target="_blank" class="bg-indigo-600 text-white px-3 py-1.5 md:px-6 md:py-2.5 rounded-full text-[10px] md:text-sm font-bold shadow-lg shadow-indigo-100">
                WA
            </a>
        </div>
    </div>
</nav>

    <section id="jasa" class="max-w-6xl mx-auto py-24 px-6">
        <div class="flex items-center gap-6 mb-16">
            <h2 class="text-3xl font-extrabold tracking-tight">Layanan Coding</h2>
            <div class="h-[2px] flex-1 bg-slate-100"></div>
        </div>
        <div id="jasa-grid" class="grid md:grid-cols-2 gap-10 text-center md:text-left"></div>
    </section>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/60 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] max-w-lg w-full p-12 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-3xl">&times;</button>
            <div id="modal-content"></div>
            <div class="mt-10">
                <a id="modal-cta" href="#" target="_blank" class="block w-full bg-indigo-600 text-white text-center py-4 rounded-2xl font-bold">Diskusikan Project</a>
            </div>
        </div>
    </div>

    <script>
        async function renderJasa() {
    const container = document.getElementById('jasa-grid');
    try {
        const response = await fetch('data.json?v=' + Date.now());
        const data = await response.json();
        window.currentData = data.digital; // Simpan untuk modal

        let html = '';
        data.digital.forEach((item) => {
            const icon = item.id === 'web-dev' ? '🌐' : '🤖';
            html += `
                <div class="card-modern bg-white p-10 rounded-[3rem] border border-slate-100">
                    <div class="text-3xl mb-4">${icon}</div>
                    <h3 class="text-2xl font-black mb-4">${item.title}</h3>
                    <p class="text-slate-500 mb-8">${item.desc}</p>
                    <button onclick="openModalJSON('${item.id}')" class="text-indigo-600 font-bold">CEK DETAIL →</button>
                </div>`;
        });
        container.innerHTML = html;
    } catch (e) { console.error(e); }
}

function openModalJSON(id) {
    const item = window.currentData.find(d => d.id === id);
    if(item) {
        document.getElementById('modal-content').innerHTML = `<h2 class="text-2xl font-bold">${item.title}</h2><p class="mt-4">${item.detail}</p>`;
        document.getElementById('modal-cta').href = item.waLink;
        document.getElementById('modal-container').classList.remove('hidden');
    }
}
window.onload = renderJasa;
    </script>
</body>
</html>

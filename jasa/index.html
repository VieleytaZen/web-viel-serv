<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Coding | Viel Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .btn-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-slate-100 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="font-bold text-slate-400 hover:text-indigo-600 transition">← Home</a>
            <span class="text-xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VIEL DIGITAL</span>
            <div class="w-10"></div>
        </div>
    </nav>

    <header class="py-20 px-6 text-center animate__animated animate__fadeIn">
        <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">Layanan <span class="text-indigo-600">Coding.</span></h1>
        <p class="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed">Solusi koding profesional untuk kebutuhan website dan automasi bisnismu.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-32">
        <div id="jasa-grid" class="grid md:grid-cols-2 gap-10">
            </div>
    </main>

    <div id="modal-container" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] max-w-xl w-full p-10 relative shadow-2xl animate__animated animate__zoomIn">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900 text-3xl transition">&times;</button>
            <div id="modal-content"></div>
            <div class="mt-8">
                <a id="modal-cta" href="#" target="_blank" class="block w-full btn-gradient text-white text-center py-4 rounded-2xl font-bold shadow-lg hover:opacity-90 transition transform hover:scale-[1.02]">Diskusikan Project Sekarang</a>
            </div>
        </div>
    </div>

    <script>
        window.currentData = [];

        async function renderJasa() {
            const container = document.getElementById('jasa-grid');
            try {
                // Anti-cache dengan timestamp
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error("File data.json tidak ditemukan");
                
                const data = await response.json();
                window.currentData = data.digital || []; 

                let html = '';
                window.currentData.forEach((item, index) => {
                    // Penanganan Error: Pastikan ID ada sebelum menjalankan .includes()
                    const safeId = (item.id || "service").toLowerCase();
                    const icon = safeId.includes('web') ? '🌐' : '🤖';
                    
                    html += `
                        <div class="glass-card p-10 rounded-[3rem] hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.1}s">
                            <div class="flex justify-between items-start mb-8">
                                <div class="text-5xl">${icon}</div>
                                <span class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">${item.price || 'TBA'}</span>
                            </div>
                            <h3 class="text-2xl font-black text-slate-900 mb-4">${item.title || 'Untitled Service'}</h3>
                            <p class="text-slate-500 mb-8 leading-relaxed">${item.desc || ''}</p>
                            <button onclick="openModal('${item.id}')" class="font-bold text-indigo-600 hover:text-indigo-800 transition flex items-center gap-2 group">
                                Cek Detail <span class="inline-block group-hover:translate-x-1 transition-transform">→</span>
                            </button>
                        </div>`;
                });
                
                container.innerHTML = html || "<p class='col-span-full text-center py-20 text-slate-400 font-medium uppercase tracking-widest text-xs'>Belum ada layanan tersedia.</p>";
            } catch (e) { 
                console.error("Error memuat layanan:", e);
                container.innerHTML = `<div class='col-span-full text-center py-20 bg-red-50 rounded-[3rem] border border-red-100'>
                    <p class='text-red-500 font-bold'>Gagal memuat database.</p>
                    <p class='text-red-400 text-xs mt-2'>Error: ${e.message}</p>
                </div>`;
            }
        }

        function openModal(id) {
            const item = window.currentData.find(d => d.id === id);
            if(item) {
                document.getElementById('modal-content').innerHTML = `
                    <div class="mb-2 uppercase text-[10px] font-black tracking-[0.2em] text-indigo-500">Service Detail</div>
                    <h2 class="text-3xl font-black text-slate-900 mb-6">${item.title}</h2>
                    <div class="bg-slate-50 p-8 rounded-[2rem] text-slate-600 leading-relaxed whitespace-pre-line text-sm border border-slate-100">${item.detail || 'Tidak ada detail tambahan.'}</div>
                `;
                document.getElementById('modal-cta').href = item.waLink || 'https://wa.me/yournumber';
                document.getElementById('modal-container').classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Stop scroll saat modal buka
            }
        }

        function closeModal() { 
            document.getElementById('modal-container').classList.add('hidden'); 
            document.body.style.overflow = 'auto'; // Aktifkan scroll lagi
        }

        // Jalankan render saat halaman siap
        document.addEventListener('DOMContentLoaded', renderJasa);
    </script>
</body>
</html>

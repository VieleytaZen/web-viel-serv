<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; }
        
        #product-search:focus {
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.1);
        }

        /* Toast Notification Styling */
        #share-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div id="share-toast" class="animate__animated">Link Tersalin ke Clipboard! 📋</div>

    <nav class="py-6 px-8 flex justify-between items-center border-b border-slate-50 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <a href="../../index.html" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition">← Kembali</a>
        <span class="text-xl font-black italic tracking-tighter text-indigo-600 uppercase">Viel Picks.</span>
        <div class="w-10"></div>
    </nav>

    <header class="pt-20 pb-10 px-6 text-center animate__animated animate__fadeIn">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-3 tracking-tight">Rekomendasi Setup</h1>
        <p class="text-slate-400 text-sm">Pilihan perlengkapan kerja dan gadget terbaik pilihan Viel.</p>
    </header>

    <div class="max-w-md mx-auto mb-12 px-6 animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
        <div class="relative group">
            <input type="text" id="product-search" onkeyup="searchProducts()" 
                   placeholder="Cari produk... (misal: hoodie, laptop, bot)" 
                   class="w-full bg-slate-50 border border-slate-200 rounded-[2rem] py-4 px-8 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all duration-300">
            <div class="absolute right-6 top-4 text-slate-300 group-focus-within:text-indigo-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <p class="col-span-full text-center text-slate-300 text-xs animate-pulse uppercase tracking-widest">Menghubungkan ke database...</p>
        </div>
    </main>

    <script>
        let allProducts = []; 
        let filteredByUrl = []; 

        async function fetchAffiliate() {
            const container = document.getElementById('affiliate-grid');
            const urlParams = new URLSearchParams(window.location.search);
            const filterCat = urlParams.get('cat'); 

            const username = "VieleytaZen";
            const repo = "web-viel-serv";
            const folderPath = "jasa/affiliate/items";

            try {
                const res = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}?ref=main&cb=${Date.now()}`);
                if (!res.ok) throw new Error("Database tidak ditemukan.");
                
                const files = await res.json();
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));

                const promises = jsonFiles.map(f => fetch(f.download_url).then(r => r.json()));
                allProducts = await Promise.all(promises);

                if (filterCat) {
                    filteredByUrl = allProducts.filter(p => p.category === filterCat);
                    const titleElement = document.querySelector('h1');
                    if(titleElement) titleElement.innerText = `Picks: ${filterCat}`;
                } else {
                    filteredByUrl = allProducts;
                }

                renderProducts(filteredByUrl);
            } catch (e) {
                console.error(e);
                container.innerHTML = `<p class="col-span-full text-center text-slate-400 text-[10px] py-20 uppercase tracking-widest">Gagal memuat data.</p>`;
            }
        }

        function searchProducts() {
            const query = document.getElementById('product-search').value.toLowerCase().trim();
            const results = filteredByUrl.filter(item => {
                const title = (item.title || "").toLowerCase();
                const category = (item.category || "").toLowerCase();
                const sub = (item.sub || "").toLowerCase();
                return title.includes(query) || category.includes(query) || sub.includes(query);
            });
            renderProducts(results);
        }

        // FUNGSI SHARE
        function shareProduct(link) {
            navigator.clipboard.writeText(link).then(() => {
                const toast = document.getElementById('share-toast');
                toast.style.display = 'block';
                toast.classList.add('animate__fadeInUp');
                
                setTimeout(() => {
                    toast.classList.replace('animate__fadeInUp', 'animate__fadeOutDown');
                    setTimeout(() => {
                        toast.style.display = 'none';
                        toast.classList.remove('animate__fadeOutDown');
                    }, 500);
                }, 2000);
            });
        }

        function renderProducts(products) {
            const container = document.getElementById('affiliate-grid');
            let html = '';
            
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-40"><p class="text-xs font-bold uppercase tracking-widest">Tidak ada produk.</p></div>`;
                return;
            }

            products.forEach((item, index) => {
                html += `
                    <div class="group bg-white border border-slate-100 rounded-[2.5rem] overflow-hidden hover:shadow-2xl hover:-translate-y-1 transition-all duration-500 animate__animated animate__fadeInUp" style="animation-delay: ${index * 0.05}s">
                        <div class="aspect-square overflow-hidden bg-slate-50 relative">
                            <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <button onclick="shareProduct('${item.link}')" class="absolute top-4 right-4 bg-white/80 backdrop-blur-md p-2 rounded-full shadow-sm hover:bg-indigo-600 hover:text-white transition-all duration-300 opacity-0 group-hover:opacity-100 transform translate-y-2 group-hover:translate-y-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6a3 3 0 100-2.684m0 2.684l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                                </svg>
                            </button>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-3">
                                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[8px] font-black uppercase tracking-widest">${item.category || 'GEAR'}</span>
                                <span class="text-[9px] font-bold text-slate-300 italic">${item.sub || ''}</span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-base mb-4 leading-tight">${item.title}</h3>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                                <span class="font-black text-slate-900 text-sm">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl text-[10px] font-bold transition-all shadow-lg shadow-indigo-100">BELI</a>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.onload = fetchAffiliate;
    </script>
</body>
</html>

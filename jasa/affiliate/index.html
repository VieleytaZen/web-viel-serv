<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Picks | Rekomendasi Produk Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b py-4 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="font-bold text-slate-500 hover:text-indigo-600">← Kembali ke Jasa</a>
            <span class="font-black text-xl text-indigo-600 italic">VIEL PICKS.</span>
        </div>
    </nav>

    <header class="py-16 text-center">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Saran Produk Setup</h1>
        <p class="text-slate-500">Kumpulan perlengkapan kerja dan gadget terbaik pilihan saya.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="affiliate-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <script>
        function renderAffiliate() {
            const container = document.getElementById('affiliate-grid');
            let html = '';
            DB_AFFILIATE.forEach(item => {
                html += `
                    <div class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-white">
                        <div class="h-52 overflow-hidden bg-slate-100">
                            <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700">
                        </div>
                        <div class="p-6">
                            <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${item.category}</span>
                            <h2 class="font-bold text-slate-800 mt-2 mb-4 h-10 line-clamp-2 text-sm">${item.title}</h2>
                            <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-50">
                                <span class="font-bold text-slate-900">${item.price}</span>
                                <a href="${item.link}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-900 transition">Cek Produk</a>
                            </div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }
        document.addEventListener('DOMContentLoaded', renderAffiliate);
    </script>
</body>
</html>
